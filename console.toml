# console.toml for resume-manager — deployed via Sam-Stuhl/console.
# Validated on every build before anything touches Docker.

# Runtime secrets, by NAME only (values live in the console, never in git):
#   DATABASE_URL           Postgres connection string (REQUIRED)
#   SESSION_SECRET         random 32+ byte string that signs the session cookie
#                          (REQUIRED). Generate: `openssl rand -base64 48`.
#   GOOGLE_CLIENT_ID       Google OAuth web-client id (REQUIRED for sign-in)
#   GOOGLE_CLIENT_SECRET   Google OAuth web-client secret (REQUIRED for sign-in)
#
# The app does its OWN auth now (Cloudflare Access is gone): users sign in with
# Google and get a signed session cookie. In the Google Cloud console create an
# OAuth 2.0 Web client and add this authorized redirect URI:
#   https://resume.kosmoskit.com/api/auth/google/callback
# DEV_USER_EMAIL must NEVER be set here (it bypasses auth; local dev only).
secrets = ["DATABASE_URL", "SESSION_SECRET", "GOOGLE_CLIENT_ID", "GOOGLE_CLIENT_SECRET"]

[app]
name = "resume-manager"
subdomain = "resume"       # serves at resume.kosmoskit.com
port = 8080

[health]
path = "/health"
timeout = 90               # first boot creates tables

[resources]
memory = "512m"
cpus = 1.0

[env]
# Non-secret runtime config.
APP_BASE_URL = "https://resume.kosmoskit.com"   # public origin: OAuth redirect + Secure cookies
# DEFAULT_MODEL = "claude-sonnet-5"
#
# Signup / resource guardrails (all optional; unset = unlimited / off):
# MAX_USERS = "50"                # cap distinct accounts (protects the DB)
# MAX_VERSIONS_PER_USER = "200"   # per-user version cap; commits rejected at the cap
# COMPILE_RATE_PER_MIN = "30"     # per-user PDF-compile budget
# CHAT_RATE_PER_MIN = "30"        # per-user assistant-request budget
