# Deploy resume-manager through the console.
#
# Thin caller — the build+notify logic lives once in sam-stuhl/console,
# .github/workflows/app-deploy.yml. Pin @main to a commit sha for stability.
#
# One-time setup: in Cloudflare Access, add a Bypass policy for /hooks/* on the
# console hostname (those endpoints authenticate via GitHub OIDC).
#
# This file must live at .github/workflows/deploy.yml in the repo.

name: deploy

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    uses: sam-stuhl/console/.github/workflows/app-deploy.yml@main
    permissions:
      id-token: write
      packages: write
      contents: read
